components:
  schemas:
    BrandProfileResponse:
      properties:
        company_name:
          title: Company Name
          type: string
        gst:
          anyOf:
          - type: string
          - type: 'null'
          title: Gst
        industry:
          title: Industry
          type: string
        user_id:
          format: uuid
          title: User Id
          type: string
        website:
          title: Website
          type: string
      required:
      - user_id
      - company_name
      - industry
      - website
      - gst
      title: BrandProfileResponse
      type: object
    BrandProfileUpdateRequest:
      properties:
        company_name:
          maxLength: 160
          minLength: 1
          title: Company Name
          type: string
        gst:
          anyOf:
          - maxLength: 15
            type: string
          - type: 'null'
          title: Gst
        industry:
          maxLength: 80
          minLength: 1
          title: Industry
          type: string
        website:
          maxLength: 255
          title: Website
          type: string
      required:
      - company_name
      - industry
      - website
      title: BrandProfileUpdateRequest
      type: object
    CampaignBuilderAccessResponse:
      properties:
        can_create_campaign:
          title: Can Create Campaign
          type: boolean
        profile_complete:
          title: Profile Complete
          type: boolean
      required:
      - can_create_campaign
      - profile_complete
      title: CampaignBuilderAccessResponse
      type: object
    ConnectSocialRequest:
      properties:
        oauth_code:
          title: Oauth Code
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
      required:
      - platform
      - oauth_code
      title: ConnectSocialRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    Health:
      description: Service health probe response.
      properties:
        db:
          title: Db
          type: boolean
        redis:
          title: Redis
          type: boolean
        status:
          examples:
          - ok
          title: Status
          type: string
      required:
      - status
      - db
      - redis
      title: Health
      type: object
    LoginRequest:
      properties:
        firebase_token:
          title: Firebase Token
          type: string
      required:
      - firebase_token
      title: LoginRequest
      type: object
    LoginResponse:
      properties:
        access_token:
          title: Access Token
          type: string
        role:
          anyOf:
          - $ref: '#/components/schemas/Role'
          - type: 'null'
        role_set:
          title: Role Set
          type: boolean
        token_type:
          default: bearer
          title: Token Type
          type: string
      required:
      - access_token
      - role
      - role_set
      title: LoginResponse
      type: object
    MeResponse:
      properties:
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
        firebase_uid:
          title: Firebase Uid
          type: string
        role:
          $ref: '#/components/schemas/Role'
        role_set:
          title: Role Set
          type: boolean
      required:
      - firebase_uid
      - email
      - role
      - role_set
      title: MeResponse
      type: object
    Platform:
      enum:
      - instagram
      - youtube
      title: Platform
      type: string
    ProfileResponse:
      properties:
        bio:
          anyOf:
          - type: string
          - type: 'null'
          title: Bio
        categories:
          items:
            type: string
          title: Categories
          type: array
        niche:
          anyOf:
          - type: string
          - type: 'null'
          title: Niche
        social_accounts:
          default: []
          items:
            $ref: '#/components/schemas/SocialAccountOut'
          title: Social Accounts
          type: array
        user_id:
          format: uuid
          title: User Id
          type: string
        verified:
          title: Verified
          type: boolean
      required:
      - user_id
      - niche
      - bio
      - categories
      - verified
      title: ProfileResponse
      type: object
    ProfileUpdateRequest:
      properties:
        bio:
          anyOf:
          - maxLength: 500
            type: string
          - type: 'null'
          title: Bio
        categories:
          items:
            type: string
          maxItems: 10
          title: Categories
          type: array
        niche:
          anyOf:
          - maxLength: 120
            type: string
          - type: 'null'
          title: Niche
      title: ProfileUpdateRequest
      type: object
    Role:
      enum:
      - influencer
      - brand
      - admin
      title: Role
      type: string
    SetRoleRequest:
      properties:
        role:
          $ref: '#/components/schemas/Role'
      required:
      - role
      title: SetRoleRequest
      type: object
    SetRoleResponse:
      properties:
        role:
          $ref: '#/components/schemas/Role'
        role_set:
          title: Role Set
          type: boolean
      required:
      - role
      - role_set
      title: SetRoleResponse
      type: object
    SocialAccountOut:
      properties:
        connected_at:
          format: date-time
          title: Connected At
          type: string
        engagement_rate:
          title: Engagement Rate
          type: number
        followers:
          title: Followers
          type: integer
        platform:
          $ref: '#/components/schemas/Platform'
        reach:
          title: Reach
          type: integer
      required:
      - platform
      - followers
      - reach
      - engagement_rate
      - connected_at
      title: SocialAccountOut
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  description: P0 contract for the Cravio influencer marketplace. Generated from FastAPI
    route and Pydantic schema definitions, committed to docs/openapi.yaml, and drift-checked
    in CI (see ADR-0001/0002).
  title: Cravio API
  version: 0.1.0
openapi: 3.1.0
paths:
  /auth/login:
    post:
      operationId: login_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Exchange Firebase ID token for internal JWT
      tags:
      - Auth
  /auth/me:
    get:
      operationId: me_auth_me_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get current user (requires role set)
      tags:
      - Auth
  /auth/role:
    post:
      operationId: set_role_auth_role_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRoleRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetRoleResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Set role once during onboarding
      tags:
      - Auth
  /brand/campaign-builder:
    get:
      description: 'Server-enforced brand gate (A5 AC2). `_require_brand` 403s influencers;

        `profile_complete` tells the client whether brand setup is done so it can
        route

        straight into the builder (C1) or back to profile setup.'
      operationId: campaign_builder_access_brand_campaign_builder_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignBuilderAccessResponse'
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Brand-only gate confirming the caller can reach the campaign builder
      tags:
      - Brand
  /brand/profile:
    get:
      operationId: get_profile_brand_profile_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandProfileResponse'
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get brand profile
      tags:
      - Brand
    put:
      operationId: put_profile_brand_profile_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrandProfileUpdateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandProfileResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create or update brand profile
      tags:
      - Brand
  /health:
    get:
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
          description: Successful Response
      summary: Health check
      tags:
      - System
  /influencer/profile:
    get:
      operationId: get_profile_influencer_profile_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get influencer profile
      tags:
      - Influencer
    put:
      operationId: put_profile_influencer_profile_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create or update influencer profile
      tags:
      - Influencer
  /influencer/profile/connect:
    post:
      operationId: connect_social_influencer_profile_connect_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectSocialRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Connect Instagram or YouTube; fetches and stores verified metrics
      tags:
      - Influencer
servers:
- description: Production
  url: https://api.cravio.in
- description: Local
  url: http://localhost:8000

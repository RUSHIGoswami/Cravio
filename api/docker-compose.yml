services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cravio
      POSTGRES_PASSWORD: cravio
      POSTGRES_DB: cravio
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cravio"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
